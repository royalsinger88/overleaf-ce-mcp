name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install "mcp>=1.0.0" "requests>=2.31.0" "beautifulsoup4>=4.11.1" "pytest>=8.0.0"

      - name: Static compile check
        run: python -m compileall overleaf_ce_mcp

      - name: Run tests
        run: pytest -q
